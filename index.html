<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tải Truyện ePub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-bar {
            width: 0%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Tải Truyện Vào Email</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email nhận tệp đính kèm</label>
                <input type="email" id="emailInput" placeholder="VD: user@gmail.com" required
                       class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">URL Trang Chủ Truyện</label>
                <input type="text" id="urlInput" placeholder="VD: https://truyenfull.vn/..." 
                       class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tên Truyện</label>
                    <input type="text" id="titleInput" placeholder="VD: Phàm Nhân Tu Tiên" 
                           class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Khoảng Chương</label>
                    <input type="text" id="rangeInput" placeholder="VD: 1-100" 
                           class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
            </div>

            <button id="startBtn" onclick="submitJob()" 
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition-colors">
                Xếp Hàng Đợi Tải Truyện
            </button>
        </div>

        <div id="progressContainer" class="hidden mt-6">
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500 progress-bar"></div>
            </div>
            <p id="statusLabel" class="text-sm text-center text-gray-600 font-medium">Đang kiểm tra hàng đợi...</p>
        </div>
    </div>

    <script>
        // Thay link API Render thực tế của bạn vào đây
        const API_BASE_URL = "https://epub-scraper.onrender.com/api/v1";
        let pollingInterval;

        async function submitJob() {
            const email = document.getElementById('emailInput').value;
            const url = document.getElementById('urlInput').value;
            const title = document.getElementById('titleInput').value;
            const range = document.getElementById('rangeInput').value;
            const statusLabel = document.getElementById('statusLabel');
            const startBtn = document.getElementById('startBtn');
            const progressContainer = document.getElementById('progressContainer');

            if (!email ||!url ||!title ||!range.includes("-")) {
                alert("Vui lòng điền đủ thông tin và nhập khoảng chương hợp lệ (VD: 1-100).");
                return;
            }

            startBtn.disabled = true;
            startBtn.classList.add("opacity-50", "cursor-not-allowed");
            progressContainer.classList.remove("hidden");
            statusLabel.innerText = "Đang gửi yêu cầu vào hệ thống...";

            try {
                const response = await fetch(`${API_BASE_URL}/scraper/jobs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, url, title, chapter_range: range, author: "Unknown" })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || "Lỗi tạo tác vụ");
                }
                
                statusLabel.innerText = "Yêu cầu hợp lệ. Đang chờ tới lượt...";
                pollingInterval = setInterval(() => checkStatus(data.job_id), 3000); // Polling mỗi 3 giây

            } catch (error) {
                statusLabel.innerText = error.message;
                statusLabel.classList.add("text-red-600");
                startBtn.disabled = false;
                startBtn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        async function checkStatus(jobId) {
            const statusLabel = document.getElementById('statusLabel');
            const progressBar = document.getElementById('progressBar');
            const startBtn = document.getElementById('startBtn');

            try {
                const response = await fetch(`${API_BASE_URL}/scraper/jobs/${jobId}`);
                const data = await response.json();

                progressBar.style.setProperty('width', `${data.progress}%`);
                statusLabel.innerText = `${data.message}`;

                if (data.status === "completed" || data.status === "failed") {
                    clearInterval(pollingInterval);
                    startBtn.disabled = false;
                    startBtn.classList.remove("opacity-50", "cursor-not-allowed");
                    
                    if(data.status === "failed") {
                        statusLabel.classList.add("text-red-600");
                    } else {
                        statusLabel.classList.add("text-green-600");
                    }
                }
            } catch (error) {
                console.error("Lỗi khi kiểm tra tiến độ:", error);
            }
        }
    </script>
</body>
</html>
